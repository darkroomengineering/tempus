name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Gates the published package: it must build and the library source must be
  # lint-clean. This is the v1 quality bar.
  library:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run lint

  # Builds the non-shipped Astro demo app to catch demo regressions against the
  # library's source-aliased entry points.
  playground:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun --filter playground build
