name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Gates the published package: it must build and the library source must be
  # lint-clean. This is the v1 quality bar.
  library:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint

  # Advisory: builds the non-shipped demo app. Not a merge gate (continue-on-error)
  # until the playground's Astro 5 upgrade + demo fixes land (#15).
  playground:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter playground build
